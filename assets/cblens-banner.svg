<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-labelledby="banner-title">
  <title id="banner-title">CBLens — A 股可转债定价与机会筛选工作台</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1929"/>
      <stop offset="0.5" stop-color="#0F2C3D"/>
      <stop offset="1" stop-color="#1A4A4A"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5AD3C7"/>
      <stop offset="1" stop-color="#5AD3C7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="curve-grad" x1="700" y1="350" x2="1150" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5AD3C7" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#5AD3C7" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="curve-gold" x1="750" y1="340" x2="1100" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8C96A" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#F8C96A" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="glow" cx="250" cy="200" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5AD3C7" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#5AD3C7" stop-opacity="0"/>
    </radialGradient>
    <!-- Icon gradients -->
    <linearGradient id="paper-g" x1="60" y1="120" x2="150" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8F4EB"/>
      <stop offset="1" stop-color="#E8EDDE"/>
    </linearGradient>
    <radialGradient id="lens-g" cx="145" cy="190" r="55" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DDFFF7" stop-opacity="0.65"/>
      <stop offset="0.6" stop-color="#7ED9CC" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#F8C96A" stop-opacity="0.15"/>
    </radialGradient>
    <linearGradient id="rim-g" x1="95" y1="140" x2="195" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A0F0E0"/>
      <stop offset="0.5" stop-color="#5AD3C7"/>
      <stop offset="1" stop-color="#3DB8AB"/>
    </linearGradient>
    <linearGradient id="handle-g" x1="180" y1="228" x2="220" y2="268" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5AD3C7"/>
      <stop offset="0.5" stop-color="#E8B84A"/>
      <stop offset="1" stop-color="#F8C96A"/>
    </linearGradient>
    <filter id="icon-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#040C18" flood-opacity="0.40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="32"/>

  <!-- Ambient glow behind icon -->
  <circle cx="250" cy="200" r="280" fill="url(#glow)"/>

  <!-- Subtle grid (financial terminal feel) -->
  <g opacity="0.035" stroke="#5AD3C7" stroke-width="0.8">
    <line x1="700" y1="50" x2="700" y2="350"/>
    <line x1="800" y1="50" x2="800" y2="350"/>
    <line x1="900" y1="50" x2="900" y2="350"/>
    <line x1="1000" y1="50" x2="1000" y2="350"/>
    <line x1="1100" y1="50" x2="1100" y2="350"/>
    <line x1="650" y1="120" x2="1180" y2="120"/>
    <line x1="650" y1="200" x2="1180" y2="200"/>
    <line x1="650" y1="280" x2="1180" y2="280"/>
  </g>

  <!-- Decorative convexity curves -->
  <path d="M680 350 C760 310, 840 300, 920 260 C980 230, 1050 160, 1160 90"
        fill="none" stroke="url(#curve-grad)" stroke-width="3" stroke-linecap="round"/>
  <path d="M720 360 C800 330, 870 325, 940 290 C1010 255, 1070 190, 1170 110"
        fill="none" stroke="url(#curve-gold)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M650 340 C730 320, 810 315, 890 300"
        fill="none" stroke="#5AD3C7" stroke-width="1.5" stroke-linecap="round" opacity="0.08"/>

  <!-- Floating data dots -->
  <circle cx="850" cy="275" r="3" fill="#5AD3C7" opacity="0.15"/>
  <circle cx="950" cy="235" r="2.5" fill="#5AD3C7" opacity="0.12"/>
  <circle cx="1020" cy="195" r="3.5" fill="#F8C96A" opacity="0.12"/>
  <circle cx="1100" cy="140" r="2" fill="#5AD3C7" opacity="0.10"/>
  <circle cx="780" cy="310" r="2" fill="#F8C96A" opacity="0.10"/>

  <!-- Icon (mini version of cblens-icon) -->
  <g transform="translate(60, 110)" filter="url(#icon-shadow)">
    <!-- Bond paper -->
    <rect x="0" y="10" width="110" height="130" rx="12" fill="url(#paper-g)"/>
    <!-- Text lines -->
    <g opacity="0.6" stroke="#1C3854" stroke-linecap="round" fill="none">
      <line x1="16" y1="38" x2="60" y2="38" stroke-width="6"/>
      <line x1="16" y1="56" x2="76" y2="56" stroke-width="5"/>
      <line x1="16" y1="72" x2="52" y2="72" stroke-width="4.5"/>
    </g>
    <!-- Convexity curve on paper -->
    <path d="M16 120 C30 104, 45 98, 62 104 C74 108, 82 96, 98 84"
          fill="none" stroke="#E8A830" stroke-width="6" stroke-linecap="round"/>
    <!-- Lens -->
    <circle cx="80" cy="72" r="45" fill="url(#lens-g)" stroke="url(#rim-g)" stroke-width="8"/>
    <!-- Specular -->
    <path d="M55 54 C64 46, 78 44, 90 50" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
    <!-- Handle -->
    <line x1="115" y1="108" x2="148" y2="143" stroke="url(#handle-g)" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- "CBLens" text -->
  <text x="280" y="210" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="86" font-weight="700" fill="#FFFFFF" letter-spacing="-1">CBLens</text>

  <!-- Accent underline -->
  <line x1="282" y1="228" x2="530" y2="228" stroke="url(#accent-line)" stroke-width="3" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="284" y="265" font-family="'SF Pro Display', 'PingFang SC', 'Segoe UI', sans-serif"
        font-size="22" fill="#5AD3C7" opacity="0.85" letter-spacing="1">A 股可转债定价与机会筛选工作台</text>

  <!-- Small "PDE" badge -->
  <rect x="284" y="280" width="50" height="22" rx="6" fill="#5AD3C7" opacity="0.15"/>
  <text x="309" y="296" font-family="'SF Mono', 'Cascadia Mono', monospace"
        font-size="13" font-weight="700" fill="#5AD3C7" text-anchor="middle" opacity="0.70">PDE</text>

  <!-- Floating accent dot (opportunity signal) -->
  <circle cx="1140" cy="70" r="6" fill="#F8C96A" opacity="0.40"/>
  <circle cx="1140" cy="70" r="3" fill="#FFFFFF" opacity="0.25"/>
</svg>
