[project]
name = "convertible-bond-pricer"
version = "1.0.0"
description = "可转债理论定价引擎 — Crank-Nicolson PDE 求解 + Wind 数据集成 + GUI"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "customtkinter>=5.2.2",
    "matplotlib>=3.10",
    "numpy>=2.0",
    "scipy>=1.14",
    "pillow>=10.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
cb-gui = "gui:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
